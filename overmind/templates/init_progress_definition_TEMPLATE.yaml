meta_info:
  project_id: ""
  project_classes: []
  project_type_code: ""
  project_type_label: ""
  # See overmind/init_progress_definition_data_model.md for the class_repo_paths shape.
  class_repo_paths: {}

steps:
  - step_number: 1
    phase_name: "init"
    step_name: "Initialize Repo ASDLC Metadata"
    input_required:
      - type: "user_input"
        value: "project_type"
      - type: "user_input"
        value: "project_classes"
    finished_only_if_artefacts_present:
      - file: "init_progress_definition.yaml"
    finished_only_if_conditions_meet:
      - condition: "overmind/init_progress_definition.yaml exists as the repo-level ASDLC metadata source of truth."
      - condition: "project_type_code, project_type_label, project_classes, and deferred class_repo_paths rows for selected project classes are persisted in overmind/init_progress_definition.yaml."
      - condition: "project_type_code records how the project started and is not read by feature-phase steps."

  - step_number: 1.1
    phase_name: "init"
    step_name: "Define Project Stack Blueprints And Agent Guidelines For Active Classes"
    input_required:
      - type: "document"
        value: "init_progress_definition.yaml"
      - type: "user_input"
        value: "approved stack blueprint conventions and agent guidelines for each active type A stack class"
    finished_only_if_artefacts_present:
      - file: "project_stack_blueprint_backend.md"
        required_if:
          meta_info:
            project_type_code:
              equals: "A"
            project_classes:
              any_of: ["backend"]
      - file: "project_stack_blueprint_frontend.md"
        required_if:
          meta_info:
            project_type_code:
              equals: "A"
            project_classes:
              any_of: ["frontend"]
      - file: "project_stack_blueprint_mobile.md"
        required_if:
          meta_info:
            project_type_code:
              equals: "A"
            project_classes:
              any_of: ["mobile"]
      - file: "project_agents_md_claude_md_backend.md"
        required_if:
          meta_info:
            project_type_code:
              equals: "A"
            project_classes:
              any_of: ["backend"]
      - file: "project_agents_md_claude_md_frontend.md"
        required_if:
          meta_info:
            project_type_code:
              equals: "A"
            project_classes:
              any_of: ["frontend"]
      - file: "project_agents_md_claude_md_mobile.md"
        required_if:
          meta_info:
            project_type_code:
              equals: "A"
            project_classes:
              any_of: ["mobile"]
    finished_only_if_conditions_meet:
      - condition: "For project type A, every active backend/frontend/mobile class has exactly one approved project_stack_blueprint_<class>.md and one approved project_agents_md_claude_md_<class>.md at the project root."
      - condition: "For project types B and C, this step is not required and does not block Create Cross-Repository Contract Definition For This Project."
      - condition: "This step captures stable stack choices, layer folder conventions, and component archetypes without capturing feature-specific implementation work."
      - condition: "For project type A, every active backend blueprint with an in-project peer class (another backend, frontend, or mobile) includes a valid Cross-Class Transport/Contract Approach as defined by the project stack blueprint rule and the TypeScript stack-blueprint gate."
      - condition: "overmind project init owns this step through the TypeScript generic executor; overmind gate stack-blueprint validates each project_stack_blueprint_<class>.md target and overmind gate agents-md validates each project_agents_md_claude_md_<class>.md target."
      - condition: "After every applicable type A class session returns, overmind project init checkpoints only the applicable project_stack_blueprint_<class>.md and project_agents_md_claude_md_<class>.md paths with commit message Finalize project stack baseline."
      - condition: "After the stack baseline checkpoint, overmind project init asks Continue with common contract definition? [Y/n]; yes or blank starts Create Cross-Repository Contract Definition For This Project in the same invocation, while no or closed input pauses successfully with that step pending."
      - condition: "Cross-Class Transport/Contract Approach is a no-op when no in-project peer exists (lone backend or no backend) and for project types B and C."

  - step_number: 2
    phase_name: "init"
    step_name: "Create Cross-Repository Contract Definition For This Project"
    input_required:
      - type: "document"
        value: "init_progress_definition.yaml"
    finished_only_if_artefacts_present:
      - file: "common_contract_definition.md"
        special_folder: "/product"
    finished_only_if_conditions_meet:
      - condition: "For project types B and C, active BE/FE/Mobile lines provide req/resp contract evidence to the Product Owner using the configured repo paths."
      - condition: "For project types B and C, class-specific contract inventory artifacts may be prepared as supporting evidence before reconciliation."
      - condition: "For project type A, common_contract_definition.md uses approved per-class project_stack_blueprint_<class>.md as read-only project context only, not as contract schema content, repository scan evidence, or surface-map evidence."
      - condition: "For project type A, Create Cross-Repository Contract Definition For This Project cannot proceed until Define Project Stack Blueprints And Agent Guidelines For Active Classes has produced every required active-class project_stack_blueprint_<class>.md and project_agents_md_claude_md_<class>.md, and each one passes its gate."
      - condition: "common_contract_definition.md reconciles applicable cross-project contract overlaps, mismatches, and shared definitions."
      - condition: "When only one source is applicable by project class/type, common_contract_definition.md explicitly documents the single-source basis."
      - condition: "For project type A, when at least one in-project cross-class peer exists for the backend (another active backend, an active frontend, or an active mobile class), common_contract_definition.md reflects each active backend blueprint's Cross-Class Transport/Contract Approach verbatim; concrete values mirror as concrete values, the literal placeholder mirrors as the placeholder, and per-backend ownership is recorded by service_name or repo_name when more than one active backend exists."
      - condition: "For project type A, placeholder carry-through in Cross-Class Transport/Contract Approach does not block Create Cross-Repository Contract Definition For This Project."
      - condition: "For project type A with no in-project cross-class peer (lone backend or no active backend) and for project types B and C, common_contract_definition.md writes no Cross-Class Transport/Contract Approach mirror entries."
      - condition: "overmind project init owns this step through the TypeScript generic executor and the common-contract TypeScript gate validates common_contract_definition.md."
      - condition: "On successful completion, the project git repository has a committed initialization baseline containing init_progress_definition.yaml, common_contract_definition.md, every applicable project_stack_blueprint_<class>.md, and every applicable project_agents_md_claude_md_<class>.md across the stack-baseline and final-baseline checkpoints."
      - condition: "After common_contract_definition.md has a committed version in HEAD, changed shared project-definition paths are project reconciliation checkpoint work."

  - step_number: 3
    phase_name: "feature"
    step_name: "Initialize and Enrich Business Requirements Structuring"
    input_required:
      - type: "user_input"
        value: "Epic or Story input"
      - type: "user_input"
        value: "class_repo_paths for active project classes"
    finished_only_if_artefacts_present:
      - file: "feature_br_summary.md"
        special_folder: "/product"
    finished_only_if_conditions_meet:
      - condition: "feature_br_summary.md is created as the feature-phase business requirements working document scaffold."
      - condition: "Feature metadata needed for downstream BR enrichment is initialized in feature_br_summary.md."

  - step_number: 4.1
    phase_name: "feature"
    step_name: "Scan repo and apply task-to-BR update"
    input_required:
      - type: "document"
        value: "feature_br_summary.md"
      - type: "document"
        value: "init_progress_definition.yaml"
      - type: "user_input"
        value: "Epic or Story input"
    finished_only_if_artefacts_present:
      - file: "user_br_input.md"
        special_folder: "/product"
    finished_only_if_conditions_meet:
      - condition: "The overmind-task-to-br skill output is captured in user_br_input.md for this feature."
      - condition: "user_br_input.md retains the actual source story/request content used during task-to-BR extraction."
      - condition: "Classes with class_repo_paths.<class>.state: 'ready' are scanned for repository context; classes with state: 'deferred' are skipped."
      - condition: "The step is a no-op when no class has state: 'ready'."

  - step_number: 4.2
    phase_name: "feature"
    step_name: "Clarify BR and check EARS readiness"
    input_required:
      - type: "document"
        value: "feature_br_summary.md"
      - type: "document"
        value: "user_br_input.md"
    finished_only_if_artefacts_present:
      - file: "feature_br_summary.md"
        special_folder: "/product"
        check_key_value:
          key: "ready_to_ears"
          equals: "true"
          section: "## 1. Document Meta"
    finished_only_if_conditions_meet:
      - condition: "feature_br_summary.md has been iteratively enriched until required quality is reached."
      - condition: "Epic or Story input is incorporated into feature_br_summary.md during enrichment."
      - condition: "No required template fields remain empty, weak, or unclear beyond the accepted threshold."
      - condition: "If additional document analysis was repeated, each repeated run was triggered only by newly provided files."
      - condition: "If Q&A was used, user answers were first logged and then merged into feature_br_summary.md only after the Q&A session ended."
      - condition: "For project type A, the feature was checked and confirmed as a valid starting feature for a new project."

  - step_number: 5
    phase_name: "feature"
    step_name: "Convert Business Requirements Structuring to EARS"
    input_required:
      - type: "document"
        value: "feature_br_summary.md"
    finished_only_if_artefacts_present:
      - file: "requirements_ears.md"
        special_folder: "/product"
    finished_only_if_conditions_meet:
      - condition: "requirements_ears.md is derived from the validated feature_br_summary.md."
      - condition: "Requirements are written in EARS-style statements."
      - condition: "Requirement IDs are present and consistent."
      - condition: "Coverage is complete for all in-scope feature requirements."

  - step_number: 5.1
    phase_name: "feature"
    step_name: "(optional) requirement_ears extra review"
    optional: true
    input_required:
      - type: "document"
        value: "feature_br_summary.md"
      - type: "document"
        value: "requirements_ears.md"
    finished_only_if_artefacts_present:
      - file: "requirements_ears_review.md"
        special_folder: "/product"
        check_key_value:
          key: "review_status"
          equals: "complete"
          section: "## 1. Document Meta"
    finished_only_if_conditions_meet:
      - condition: "requirements_ears_review.md records the review findings discovered by checking requirements_ears.md against feature_br_summary.md."
      - condition: "Each review finding is tracked with one state from: escalated, added to ears, rejected, postponed."
      - condition: "When review_status is complete, no escalated findings remain."

  - step_number: 6
    phase_name: "feature"
    step_name: "Define Feature Contract Delta"
    input_required:
      - type: "document"
        value: "requirements_ears.md"
      - type: "document"
        value: "common_contract_definition.md"
      - type: "document"
        value: "init_progress_definition.yaml"
    finished_only_if_artefacts_present:
      - file: "feature_contract_delta.md"
        special_folder: "/product"
    finished_only_if_conditions_meet:
      - condition: "feature_contract_delta.md defines the feature-specific contract additions or changes against the stable baseline in common_contract_definition.md."
      - condition: "Classes with class_repo_paths.<class>.state: 'ready' contribute repository evidence to the contract delta; classes with state: 'deferred' are skipped."
      - condition: "The Product Owner provides feature_contract_delta.md to active BE/FE/Mobile lines before surface mapping starts."
      - condition: "feature_contract_delta.md focuses on feature-level contract deltas and does not redefine stable cross-project contract types, ownership, or source-of-truth rules already captured in common_contract_definition.md."
      - condition: "When no shared contract change is needed, feature_contract_delta.md explicitly records that no contract delta is required for this feature."
      - condition: "When at least one in-project cross-class peer exists for the backend (another active backend, an active frontend, or an active mobile class), feature_contract_delta.md mirrors the current per-backend transport_protocol and schema_format from common_contract_definition.md; the feature may record concrete values directly when it defines or refines those values, regardless of whether common_contract_definition.md still carries the placeholder or different concrete values for that backend."
      - condition: "Step 6 introduces no resolution state machine, terminal-state check, required block, or quality-gate enforcement for Cross-Class Transport/Contract Approach Mirror; the per-backend fields either carry concrete values or carry the literal placeholder."
      - condition: "When no in-project cross-class peer exists (lone backend or no active backend), Step 6 writes no Cross-Class Transport/Contract Approach Mirror fields in feature_contract_delta.md."

  - step_number: 7
    phase_name: "feature"
    step_name: "Analyze Repos And Prepare Repo Execution Context"
    input_required:
      - type: "document"
        value: "init_progress_definition.yaml"
      - type: "document"
        value: "requirements_ears.md"
      - type: "document"
        value: "feature_contract_delta.md"
    finished_only_if_artefacts_present:
      - file: "project_surface_struct_resp_map_backend.md"
        special_folder: "/product"
        required_if:
          meta_info:
            project_classes:
              any_of: ["backend"]
      - file: "project_surface_struct_resp_map_frontend.md"
        special_folder: "/product"
        required_if:
          meta_info:
            project_classes:
              any_of: ["frontend"]
      - file: "project_surface_struct_resp_map_mobile.md"
        special_folder: "/product"
        required_if:
          meta_info:
            project_classes:
              any_of: ["mobile"]
    finished_only_if_conditions_meet:
      - condition: "Repo execution-context analysis runs one backend, frontend, or mobile class at a time when class_repo_paths.<class> has state ready or has state deferred with policy A and the matching project_stack_blueprint_<class>.md file exists; deferred policy B/C classes and deferred policy A classes without that file remain unavailable."
      - condition: "Backend analysis produces project_surface_struct_resp_map_backend.md when backend class is active."
      - condition: "Frontend analysis produces project_surface_struct_resp_map_frontend.md when frontend class is active."
      - condition: "Mobile analysis produces project_surface_struct_resp_map_mobile.md when mobile class is active."
      - condition: "Surface-map evidence resolution satisfies the feature repo surface and execution context rule."
      - condition: "project_surface_struct_resp_map_backend.md, project_surface_struct_resp_map_frontend.md, and project_surface_struct_resp_map_mobile.md capture feature-scoped execution context for their respective classes, grounded in project-level repo metadata and the available repository or blueprint evidence."
      - condition: "These artifacts do not redefine stable cross-project contract governance already captured in common_contract_definition.md."
      - condition: "Every surface-map row in Key Parts of Repo and Their Responsibilities and in the feature-touched surfaces block carries both transport_layer and user_reachable_surface subfields."

  - step_number: 7.1
    phase_name: "feature"
    step_name: "(optional) MCP placeholder enrichment"
    optional: true
    input_required:
      - type: "document"
        value: "project_surface_struct_resp_map_backend.md"
      - type: "document"
        value: "project_surface_struct_resp_map_frontend.md"
      - type: "document"
        value: "project_surface_struct_resp_map_mobile.md"
    finished_only_if_artefacts_present:
      - file: "project_surface_struct_resp_map_backend.md"
        special_folder: "/product"
        required_if:
          meta_info:
            project_classes:
              any_of: ["backend"]
        check_key_value:
          key: "was_enriched_with_mcp"
          equals: "true"
          section: "## 1. Document Meta"
      - file: "project_surface_struct_resp_map_frontend.md"
        special_folder: "/product"
        required_if:
          meta_info:
            project_classes:
              any_of: ["frontend"]
        check_key_value:
          key: "was_enriched_with_mcp"
          equals: "true"
          section: "## 1. Document Meta"
      - file: "project_surface_struct_resp_map_mobile.md"
        special_folder: "/product"
        required_if:
          meta_info:
            project_classes:
              any_of: ["mobile"]
        check_key_value:
          key: "was_enriched_with_mcp"
          equals: "true"
          section: "## 1. Document Meta"
    finished_only_if_conditions_meet:
      - condition: "MCP placeholder enrichment is optional. When run, it inspects existing surface-map artifacts for literal <to be defined during implementation> placeholders and, when a reachable knowledge-base MCP source is configured, proposes confirmed replacements for user approval."
      - condition: "MCP placeholder enrichment does not produce a new audit artifact. Its output is an in-place update of the relevant surface-map artifact only for user-confirmed replacements."
      - condition: "Technical Requirements may proceed when surface mapping is complete, whether MCP placeholder enrichment is skipped, no-ops, fails to find useful MCP data, or the user rejects proposed replacements."
      - condition: "MCP placeholder enrichment is considered complete when at least one existing active-class surface map has was_enriched_with_mcp set to true in Document Meta."

  - step_number: 8
    phase_name: "feature"
    step_name: "Create Feature-Scoped Technical Requirements"
    input_required:
      - type: "document"
        value: "requirements_ears.md"
      - type: "document"
        value: "common_contract_definition.md"
      - type: "document"
        value: "project_surface_struct_resp_map_backend.md"
      - type: "document"
        value: "project_surface_struct_resp_map_frontend.md"
      - type: "document"
        value: "project_surface_struct_resp_map_mobile.md"
    finished_only_if_artefacts_present:
      - file: "technical_requirements.md"
        special_folder: "/product"
        required_if:
          meta_info:
            project_classes:
              any_of: ["backend", "frontend", "mobile"]
    finished_only_if_conditions_meet:
      - condition: "For project types B and C, technical_requirements.md is created as one shared feature-scoped artifact when at least one repo class is active."
      - condition: "For project type A, technical_requirements.md would be created from requirements_ears.md, common_contract_definition.md, and the applicable per-class project surface maps plus MCP best-practice context."
      - condition: "technical_requirements.md consolidates feature-scoped repository evidence, requirement coverage/gaps, impacted components, and planning signals for the whole feature."
      - condition: "For project types B and C, direct code evidence used for this artifact is limited to feature-scoped paths selected by the applicable project_surface_struct_resp_map_backend.md, project_surface_struct_resp_map_frontend.md, and project_surface_struct_resp_map_mobile.md artifacts plus the smallest adjacent evidence files needed to confirm behavior."
      - condition: "Each impacted component entry in technical_requirements.md carries explicit repo ownership metadata."
      - condition: "This artifact does not redefine stable cross-project contract governance already captured in common_contract_definition.md."
      - condition: "Every ### Requirement: block in technical_requirements.md records current state using two explicit subfields — transport_layer and user_reachable_surface — rather than a single conflated current_state line. Neither subfield may be blank or omitted; use none when one side has no applicable entry."

  - step_number: 8.1
    phase_name: "feature"
    step_name: "Create Implementation Slice Planning Artifact"
    input_required:
      - type: "document"
        value: "requirements_ears.md"
      - type: "document"
        value: "technical_requirements.md"
      - type: "document"
        value: "feature_contract_delta.md"
      - type: "document"
        value: "project_surface_struct_resp_map_backend.md"
      - type: "document"
        value: "project_surface_struct_resp_map_frontend.md"
      - type: "document"
        value: "project_surface_struct_resp_map_mobile.md"
    finished_only_if_artefacts_present:
      - file: "implementation_slices.md"
        special_folder: "/product"
        required_if:
          meta_info:
            project_classes:
              any_of: ["backend", "frontend", "mobile"]
    finished_only_if_conditions_meet:
      - condition: "For project types B and C, planning produces one shared implementation_slices.md artifact when at least one repo class is active."
      - condition: "For project type A, implementation_slices.md would be created from requirements_ears.md, technical_requirements.md, feature_contract_delta.md, applicable surface-map artifacts, and MCP best-practice context."
      - condition: "implementation_slices.md is implementation-driven and prioritizes thin executable slices and first usable increments."
      - condition: "implementation_slices.md may use requirements_ears.md, technical_requirements.md, feature_contract_delta.md, and applicable surface-map artifacts to recover execution context."
      - condition: "implementation_slices.md captures local prerequisite intent only and does not force full global ordering."
      - condition: "implementation_slices.md does not force full REQ/NFR traceability coverage; full traceability enforcement belongs to the next phase."
      - condition: "This artifact does not redefine stable cross-project contract governance already captured in common_contract_definition.md."

  - step_number: 8.2
    phase_name: "feature"
    step_name: "Run Prerequisite Gap Trace"
    input_required:
      - type: "document"
        value: "requirements_ears.md"
      - type: "document"
        value: "technical_requirements.md"
      - type: "document"
        value: "implementation_slices.md"
    finished_only_if_artefacts_present:
      - file: "prerequisite_gaps.md"
        special_folder: "/product"
        required_if:
          meta_info:
            project_classes:
              any_of: ["backend", "frontend", "mobile"]
    finished_only_if_conditions_meet:
      - condition: "prerequisite_gaps.md records one ### Requirement: block per EARS requirement and one #### Prerequisite: entry per externally-invocable prerequisite derived from each requirement."
      - condition: "prerequisite_gaps.md satisfies the prerequisite gaps rule."
      - condition: "No unmet prerequisite entries remain before Implementation Plan begins."

  - step_number: 8.3
    phase_name: "feature"
    step_name: "Create Shared Repository Implementation Plan"
    input_required:
      - type: "document"
        value: "implementation_slices.md"
      - type: "document"
        value: "requirements_ears.md"
      - type: "document"
        value: "technical_requirements.md"
      - type: "document"
        value: "feature_contract_delta.md"
    finished_only_if_artefacts_present:
      - file: "implementation_plan.md"
        special_folder: "/product"
        required_if:
          meta_info:
            project_classes:
              any_of: ["backend", "frontend", "mobile"]
    finished_only_if_conditions_meet:
      - condition: "For project types B and C, planning produces one shared implementation_plan.md when at least one repo class is active."
      - condition: "For project type A, implementation_plan.md would be created from implementation_slices.md, requirements_ears.md, technical_requirements.md, and feature_contract_delta.md plus MCP best-practice context."
      - condition: "implementation_plan.md is based on implementation_slices.md plus requirements_ears.md, technical_requirements.md, and feature_contract_delta.md."
      - condition: "Each implementation step in implementation_plan.md is allocated to exactly one repo class using explicit repo ownership metadata."
      - condition: "Implementation steps/slices are defined in executable implementation order."
      - condition: "Cross-repo dependencies are made explicit when sequencing matters."
      - condition: "implementation_slices.md is the canonical source of implementation-driven slice decomposition for this phase."
      - condition: "technical_requirements.md remains the canonical source of current-state evidence, impacted components, and explicit gaps used to validate coverage."
      - condition: "Already implemented slices may be included when they materially explain remaining work or prerequisite state."
      - condition: "For project types B and C, missing prerequisites required to begin implementation are identified and included when needed."
      - condition: "For project type B, required refactoring of existing code is identified and included when needed."
      - condition: "This artifact does not redefine stable cross-project contract governance already captured in common_contract_definition.md."

  - step_number: 8.4
    phase_name: "feature"
    step_name: "(optional) implementation plan semantic review"
    optional: true
    input_required:
      - type: "document"
        value: "init_progress_definition.yaml"
      - type: "document"
        value: "implementation_plan.md"
      - type: "document"
        value: "requirements_ears.md"
      - type: "document"
        value: "technical_requirements.md"
      - type: "document"
        value: "prerequisite_gaps.md"
      - type: "document"
        value: "project_surface_struct_resp_map_<class>.md for active project classes"
    finished_only_if_artefacts_present:
      - file: "implementation_plan_semantic_review.md"
        special_folder: "/product"
        check_key_value:
          key: "review_status"
          equals: "complete"
          section: "## 1. Document Meta"
    finished_only_if_conditions_meet:
      - condition: "implementation_plan_semantic_review.md records semantic cohesion, split-quality, dependency-ordering, operator-reachability, and Type A repo-scaffold-readiness findings for implementation_plan.md."
      - condition: "Findings use one type from: step_scope_overlap, technical_gap_mix, dependency_ordering, requirement_grouping, delivered_surface_consumption_unclear, repo_scaffold_readiness_unclear."
      - condition: "When findings exist, user-selected findings are applied to implementation_plan.md and each finding is marked with terminal decision state."
      - condition: "When no semantic findings are present, implementation_plan_semantic_review.md records no_findings: true."
